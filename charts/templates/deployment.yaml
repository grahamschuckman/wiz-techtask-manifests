apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-wiz-{{ .Values.global.environment }}-app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wiz-{{ .Values.global.environment }}-app
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wiz-{{ .Values.global.environment }}-app
    spec:
      containers:
      - image: "{{ .Values.images.registry }}:{{ .Values.images.appTag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        name: wiz-{{ .Values.global.environment }}-app
        ports:
        - containerPort: 8080
        env:
        # 1. Check if mongodbUri is defined in values
        {{- if .Values.mongodbUri }} 
        - name: MONGODB_URI
          value: {{ .Values.mongodbUri | quote }}
        {{- end }}
      - image: "{{ .Values.images.registry }}:{{ .Values.images.proxyTag }}"
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        name: wiz-{{ .Values.global.environment }}-proxy
        ports:
        - containerPort: 8000